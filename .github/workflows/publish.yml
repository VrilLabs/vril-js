name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v2.1.0)'
        required: true
        default: 'v2.1.0'

jobs:
  publish:
    name: Publish vril-js
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          [ -f package-lock.json ] || npm install
          npm ci

      - name: Auto-bump patch version
        if: github.ref == 'refs/heads/main'
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // 1. Determine current package version from package.json
          const pkgPath = path.join(process.cwd(), 'package.json');
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          const currentVersion = pkg.version;
          console.log('Current package version:', currentVersion);
          
          // 2. Increment the patch component (the third segment) of the version by 1
          const parts = currentVersion.split('.');
          if (parts.length !== 3) {
            throw new Error('Invalid version format: ' + currentVersion);
          }
          parts[2] = String(parseInt(parts[2], 10) + 1);
          const nextVersion = parts.join('.');
          console.log('Incremented next package version:', nextVersion);
          
          // 3. Update package.json with the bumped version
          pkg.version = nextVersion;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n', 'utf8');
          
          // 4. Update package-lock.json if it exists
          const pkgLockPath = path.join(process.cwd(), 'package-lock.json');
          if (fs.existsSync(pkgLockPath)) {
            const pkgLock = JSON.parse(fs.readFileSync(pkgLockPath, 'utf8'));
            pkgLock.version = nextVersion;
            if (pkgLock.packages && pkgLock.packages['']) {
              pkgLock.packages[''].version = nextVersion;
            }
            fs.writeFileSync(pkgLockPath, JSON.stringify(pkgLock, null, 2) + '\n', 'utf8');
            console.log('Updated package-lock.json');
          }
          
          // 5. Keep src/lib/vril/version.ts synchronized with the package version
          const versionTsPath = path.join(process.cwd(), 'src/lib/vril/version.ts');
          if (fs.existsSync(versionTsPath)) {
            let content = fs.readFileSync(versionTsPath, 'utf8');
            content = content.replace(/export const VRIL_VERSION = ['\"]\d+\.\d+\.\d+['\"];/, 'export const VRIL_VERSION = \\'' + nextVersion + '\\';');
            fs.writeFileSync(versionTsPath, content, 'utf8');
            console.log('Updated src/lib/vril/version.ts');
          }
          "

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: Vril.js ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_REGISTRY_TOKEN }}
